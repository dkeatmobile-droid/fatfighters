<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: soft grey glass -->
  <rect width="512" height="512" rx="40" fill="#2A2A2A"/>

  <!-- Frosted glass overlay -->
  <rect width="512" height="512" rx="40"
        fill="rgba(255,255,255,0.08)"
        style="backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);"/>

  <!-- Neon glow behind bolt -->
  <circle cx="256" cy="256" r="180" fill="#00C8FF" opacity="0.15"/>

  <!-- Lightning bolt -->
  <polygon points="280,60 140,300 240,300 200,460 360,220 240,220"
           fill="#00C8FF"
           stroke="#00C8FF"
           stroke-width="12"
           stroke-linejoin="round"/>

  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="240"
          stroke="#00C8FF"
          stroke-width="6"
          opacity="0.25"
          fill="none"/>
</svg>
