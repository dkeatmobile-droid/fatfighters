<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forge</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti"></script>

<style>
body { font-family: system-ui; }
.glass { background: rgba(30,30,40,0.85); backdrop-filter: blur(20px); }
.nav-btn.active { color:#67e8f9; border-bottom:3px solid #67e8f9; }
.mainValue { font-size:2.5rem; font-weight:700; }
</style>
</head>

<body class="bg-zinc-950 text-white">

<!-- DASHBOARD -->
<div id="dashboard" class="screen p-6 max-w-lg mx-auto">
<h1 class="text-3xl font-bold text-cyan-400 mb-4">Forge</h1>

<div class="mb-6">
<div id="streakDisplay" class="text-3xl text-orange-400">0 🔥</div>
</div>

<div class="grid grid-cols-2 gap-4">
<div class="glass p-4 rounded-xl text-center">
<p>Weight</p>
<div id="dashWeight" class="mainValue">—</div>
</div>
<div class="glass p-4 rounded-xl text-center">
<p>Waist</p>
<div id="dashWaist" class="mainValue">—</div>
</div>
</div>

<button onclick="showScreen('log')" class="mt-6 w-full bg-cyan-400 text-black py-4 rounded-xl">
Log Progress
</button>
</div>

<!-- LOG -->
<div id="log" class="screen hidden p-6 max-w-lg mx-auto">
<h2 class="text-2xl mb-4">Log Entry</h2>

<input id="logDate" type="date" class="w-full mb-3 text-black p-2">

<input id="logWeight" type="number" placeholder="Weight" class="w-full mb-3 text-black p-2">
<input id="logWaist" type="number" placeholder="Waist" class="w-full mb-3 text-black p-2">
<input id="logDose" type="number" placeholder="Dose" class="w-full mb-3 text-black p-2">

<input id="photoInput" type="file" accept="image/*" onchange="handlePhoto(this)">

<button onclick="saveLogEntry()" class="mt-4 w-full bg-cyan-400 text-black py-3 rounded">
Save
</button>
</div>

<!-- GRAPH -->
<div id="graphs" class="screen hidden p-6 max-w-lg mx-auto">
<canvas id="chart"></canvas>
</div>

<!-- NAV -->
<nav class="fixed bottom-0 left-0 right-0 bg-zinc-900 flex">
<button onclick="showScreen('dashboard')" class="nav-btn flex-1 p-3 active">Home</button>
<button onclick="showScreen('log')" class="nav-btn flex-1 p-3">Log</button>
<button onclick="showScreen('graphs')" class="nav-btn flex-1 p-3">Graph</button>
</nav>

<script>
let entries = JSON.parse(localStorage.getItem("forgeEntries") || "[]");

// ✅ SORT FIX
entries = entries.sort((a,b)=>new Date(b.date)-new Date(a.date));

let chart;
let currentPhoto=null;

function showScreen(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
document.getElementById(id).classList.remove('hidden');

if(id==="graphs") renderChart();
if(id==="dashboard") loadDashboard();
if(id==="log") initLog();
}

function calculateStreak(){
if(!entries.length) return 0;
const dates=[...new Set(entries.map(e=>e.date))].sort().reverse();
let streak=1;

for(let i=1;i<dates.length;i++){
if((new Date(dates[i-1])-new Date(dates[i]))/86400000===1) streak++;
else break;
}
return streak;
}

function loadDashboard(){
if(!entries.length){
dashWeight.textContent="—";
dashWaist.textContent="—";
streakDisplay.textContent="0 🔥";
return;
}

const latest=entries[0];
dashWeight.textContent=latest.weight ?? "—";
dashWaist.textContent=latest.waist ?? "—";

streakDisplay.textContent=calculateStreak()+" 🔥";
}

function initLog(){
logDate.value=new Date().toISOString().split("T")[0];
logWeight.value="";
logWaist.value="";
logDose.value="";
currentPhoto=null;
}

function handlePhoto(input){
const file=input.files[0];
if(!file) return;

const img=new Image();
const reader=new FileReader();

reader.onload=e=>img.src=e.target.result;

img.onload=()=>{
const canvas=document.createElement("canvas");
const scale=600/img.width;

canvas.width=600;
canvas.height=img.height*scale;

const ctx=canvas.getContext("2d");
ctx.drawImage(img,0,0,canvas.width,canvas.height);

currentPhoto=canvas.toDataURL("image/jpeg",0.7);
};

reader.readAsDataURL(file);
}

function saveLogEntry(){

const entry={
date:logDate.value,
weight:parseFloat(logWeight.value)||null,
waist:parseFloat(logWaist.value)||null,
dose:parseFloat(logDose.value)||null,
photo:currentPhoto
};

if(!entry.weight && !entry.waist && !entry.dose){
alert("Enter data");
return;
}

// ✅ REMOVE DUPLICATE DATE
entries=entries.filter(e=>e.date!==entry.date);

entries.unshift(entry);

// ✅ SORT AGAIN
entries=entries.sort((a,b)=>new Date(b.date)-new Date(a.date));

localStorage.setItem("forgeEntries",JSON.stringify(entries));

if(calculateStreak()%7===0){
confetti({particleCount:120});
}

showScreen("dashboard");
}

function renderChart(){
if(chart) chart.destroy();

const ctx=document.getElementById("chart");

const sorted=[...entries].reverse();

chart=new Chart(ctx,{
type:"line",
data:{
labels:sorted.map(e=>e.date),
datasets:[
{
label:"Weight",
data:sorted.map(e=>e.weight ?? null),
borderColor:"#67e8f9"
},
{
label:"Waist",
data:sorted.map(e=>e.waist ?? null),
borderColor:"#fbbf24"
}
]
}
});
}

window.onload=()=>{
showScreen("dashboard");
};
</script>

</body>
</html>
