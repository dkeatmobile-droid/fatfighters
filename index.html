<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fat Fighters</title>

    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Fat Fighters">
    <link rel="apple-touch-icon" href="icon.svg">

    <!-- Tailwind CSS via CDN (modern & clean) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js for beautiful graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .nav-btn.active {
            color: #22d3ee;
            border-bottom: 3px solid #22d3ee;
        }
        .mainValue {
            font-size: 2.75rem;
            line-height: 1;
            font-weight: 700;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen pb-20">

    <!-- DASHBOARD -->
    <div id="dashboard" class="screen p-6 max-w-lg mx-auto">
        <h1 class="text-4xl font-bold text-cyan-400 mb-1">Fat Fighters</h1>
        <p class="text-zinc-400 mb-8">Hi, <span id="dashName" class="font-semibold text-white">Warrior</span> 👊</p>

        <div class="grid grid-cols-2 gap-4">
            <div class="glass rounded-3xl p-6 text-center">
                <p class="text-sm text-zinc-400">Weight</p>
                <div id="dashWeight" class="mainValue text-white">—</div>
                <p class="text-xs text-emerald-400">kg</p>
            </div>
            <div class="glass rounded-3xl p-6 text-center">
                <p class="text-sm text-zinc-400">BMI</p>
                <div id="dashBMI" class="mainValue text-white">—</div>
            </div>
            <div class="glass rounded-3xl p-6 text-center">
                <p class="text-sm text-zinc-400">Waist</p>
                <div id="dashWaist" class="mainValue text-white">—</div>
                <p class="text-xs text-amber-400">cm</p>
            </div>
            <div class="glass rounded-3xl p-6 text-center">
                <p class="text-sm text-zinc-400">Next Injection</p>
                <div id="dashInjection" class="mainValue text-white">—</div>
            </div>
        </div>

        <div class="mt-10">
            <button onclick="showScreen('log')" 
                    class="w-full bg-cyan-400 hover:bg-cyan-300 transition text-zinc-950 font-bold py-4 rounded-2xl text-lg flex items-center justify-center gap-2">
                <span>📝 Log Today's Data</span>
            </button>
        </div>
    </div>

    <!-- LOG -->
    <div id="log" class="screen p-6 max-w-lg mx-auto hidden">
        <h2 class="text-3xl font-bold mb-6 text-cyan-400">Log Entry</h2>
        
        <div class="glass rounded-3xl p-6 space-y-6">
            <div>
                <label class="block text-sm text-zinc-400 mb-1">Date</label>
                <input id="logDate" type="date" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-3 text-white">
            </div>
            <div>
                <label class="block text-sm text-zinc-400 mb-1">Weight (kg)</label>
                <input id="logWeight" type="number" step="0.1" placeholder="e.g. 92.5" 
                       class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-3 text-white">
            </div>
            <div>
                <label class="block text-sm text-zinc-400 mb-1">Waist (cm)</label>
                <input id="logWaist" type="number" step="0.1" placeholder="e.g. 105" 
                       class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-3 text-white">
            </div>
            <div>
                <label class="block text-sm text-zinc-400 mb-1">Notes (optional)</label>
                <textarea id="logNotes" rows="2" placeholder="Feeling stronger today..."
                          class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl px-4 py-3 text-white"></textarea>
            </div>
            <button onclick="saveLogEntry()" 
                    class="w-full bg-emerald-500 hover:bg-emerald-400 transition text-white font-bold py-4 rounded-2xl">
                Save Entry
            </button>
        </div>

        <h3 class="mt-10 mb-4 text-xl font-semibold">Recent Logs</h3>
        <div id="recentLogs" class="space-y-3"></div>
    </div>

    <!-- GRAPHS -->
    <div id="graphs" class="screen p-6 max-w-lg mx-auto hidden">
        <h2 class="text-3xl font-bold mb-6 text-cyan-400">Your Progress</h2>
        <div class="glass rounded-3xl p-6">
            <canvas id="weightChart" height="220"></canvas>
        </div>
    </div>

    <!-- GOALS -->
    <div id="goals" class="screen p-6 max-w-lg mx-auto hidden">
        <h2 class="text-3xl font-bold mb-6 text-cyan-400">Goals</h2>
        <div class="glass rounded-3xl p-6 space-y-8">
            <div>
                <p class="text-sm text-zinc-400">Target Weight (kg)</p>
                <input id="goalWeight" type="number" step="0.1" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-3">
            </div>
            <div>
                <p class="text-sm text-zinc-400">Target Waist (cm)</p>
                <input id="goalWaist" type="number" step="0.1" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-3">
            </div>
            <button onclick="saveGoals()" 
                    class="w-full bg-cyan-400 hover:bg-cyan-300 transition text-zinc-950 font-bold py-4 rounded-2xl">
                Save Goals
            </button>
        </div>
    </div>

    <!-- PROFILE -->
    <div id="settings" class="screen p-6 max-w-lg mx-auto hidden">
        <h2 class="text-3xl font-bold mb-6 text-cyan-400">Your Profile</h2>
        <div class="glass rounded-3xl p-6 space-y-6">
            <div>
                <label class="block text-sm text-zinc-400 mb-1">Name</label>
                <input id="profileName" type="text" placeholder="Your name" 
                       class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-3">
            </div>
            <div>
                <label class="block text-sm text-zinc-400 mb-1">Height (cm)</label>
                <input id="profileHeight" type="number" placeholder="175" 
                       class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-3">
            </div>
            <button onclick="saveProfile()" 
                    class="w-full bg-cyan-400 hover:bg-cyan-300 transition text-zinc-950 font-bold py-4 rounded-2xl">
                Save Profile
            </button>
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="fixed bottom-0 left-0 right-0 bg-zinc-900 border-t border-zinc-800">
        <div class="max-w-lg mx-auto flex text-xs">
            <button onclick="showScreen('dashboard')" class="nav-btn active flex-1 py-3 flex flex-col items-center">
                🏠<br>Home
            </button>
            <button onclick="showScreen('log')" class="nav-btn flex-1 py-3 flex flex-col items-center">
                📝<br>Log
            </button>
            <button onclick="showScreen('graphs')" class="nav-btn flex-1 py-3 flex flex-col items-center">
                📈<br>Graphs
            </button>
            <button onclick="showScreen('goals')" class="nav-btn flex-1 py-3 flex flex-col items-center">
                🎯<br>Goals
            </button>
            <button onclick="showScreen('settings')" class="nav-btn flex-1 py-3 flex flex-col items-center">
                👤<br>Profile
            </button>
        </div>
    </nav>

    <script>
        let entries = JSON.parse(localStorage.getItem("fatfightersEntries") || "[]");
        let goals = JSON.parse(localStorage.getItem("fatfightersGoals") || "{}");
        let profile = JSON.parse(localStorage.getItem("fatfightersProfile") || "{}");
        let weightChart;

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');

            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = Array.from(document.querySelectorAll('.nav-btn')).find(b => 
                b.getAttribute('onclick').includes(`'${id}'`));
            if (activeBtn) activeBtn.classList.add('active');

            if (id === 'graphs') renderChart();
            if (id === 'log') renderRecentLogs();
        }

        function saveProfile() {
            profile = {
                name: document.getElementById('profileName').value || "Warrior",
                height: parseFloat(document.getElementById('profileHeight').value) || 175
            };
            localStorage.setItem("fatfightersProfile", JSON.stringify(profile));
            alert("✅ Profile saved!");
            loadDashboard();
        }

        function saveGoals() {
            goals = {
                targetWeight: parseFloat(document.getElementById('goalWeight').value),
                targetWaist: parseFloat(document.getElementById('goalWaist').value)
            };
            localStorage.setItem("fatfightersGoals", JSON.stringify(goals));
            alert("🎯 Goals saved!");
        }

        function saveLogEntry() {
            const newEntry = {
                date: document.getElementById('logDate').value || new Date().toISOString().split('T')[0],
                weight: parseFloat(document.getElementById('logWeight').value),
                waist: parseFloat(document.getElementById('logWaist').value),
                notes: document.getElementById('logNotes').value
            };

            if (!newEntry.weight && !newEntry.waist) {
                alert("Please enter at least weight or waist.");
                return;
            }

            entries.unshift(newEntry); // newest first
            localStorage.setItem("fatfightersEntries", JSON.stringify(entries));

            alert("✅ Entry saved!");
            loadDashboard();
            renderRecentLogs();
            showScreen('dashboard');
        }

        function renderRecentLogs() {
            const container = document.getElementById('recentLogs');
            container.innerHTML = entries.slice(0, 5).map(e => `
                <div class="glass rounded-2xl p-4 text-sm">
                    <div class="flex justify-between">
                        <span class="font-medium">${e.date}</span>
                        <span>${e.weight ? e.weight + ' kg' : ''} ${e.waist ? '• ' + e.waist + ' cm' : ''}</span>
                    </div>
                    ${e.notes ? `<p class="text-zinc-400 text-xs mt-1">${e.notes}</p>` : ''}
                </div>
            `).join('');
        }

        function loadDashboard() {
            document.getElementById('dashName').textContent = profile.name || "Warrior";

            const latest = entries[0];
            document.getElementById('dashWeight').textContent = latest && latest.weight ? latest.weight : "—";
            document.getElementById('dashWaist').textContent = latest && latest.waist ? latest.waist : "—";

            if (profile.height && latest && latest.weight) {
                const bmi = (latest.weight / Math.pow(profile.height / 100, 2)).toFixed(1);
                document.getElementById('dashBMI').textContent = bmi;
            } else {
                document.getElementById('dashBMI').textContent = "—";
            }

            document.getElementById('dashInjection').textContent = profile.injectionDay || "—";
        }

        function renderChart() {
            const ctx = document.getElementById('weightChart');
            if (weightChart) weightChart.destroy();

            const sorted = [...entries].reverse();
            const labels = sorted.map(e => e.date);
            const weights = sorted.map(e => e.weight);

            weightChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Weight (kg)',
                        data: weights,
                        borderColor: '#22d3ee',
                        backgroundColor: 'rgba(34, 211, 238, 0.1)',
                        tension: 0.3,
                        borderWidth: 3
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#27272a' } },
                        x: { grid: { color: '#27272a' } }
                    }
                }
            });
        }

        // Init
        function init() {
            // Set today's date in log
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('logDate').value = today;

            loadDashboard();
            showScreen('dashboard');
        }

        window.onload = init;
    </script>
</body>
</html>
