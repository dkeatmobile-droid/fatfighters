<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forge</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icon.svg">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        .glass { 
            background: rgba(30, 30, 40, 0.78); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.12); 
            box-shadow: 0 8px 32px -12px rgba(0, 0, 0, 0.5);
        }
        .nav-btn.active { color: #67e8f9; border-bottom: 3px solid #67e8f9; }
        .mainValue { font-size: 2.85rem; line-height: 1; font-weight: 700; letter-spacing: -0.02em; }
        .forge-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .forge-icon {
            width: 42px;
            height: 42px;
        }
        .forge-text {
            font-size: 2.75rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            background: linear-gradient(90deg, #67e8f9, #a5f3fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-primary {
            background: linear-gradient(90deg, #67e8f9, #22d3ee);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-primary:active { transform: scale(0.96); }
        input[type="date"], input[type="number"], input[type="text"] {
            height: 50px;
            font-size: 1.05rem;
            padding: 0 1.25rem;
        }
        .comparison-slider { position: relative; overflow: hidden; height: 420px; border-radius: 1.5rem; }
        .comparison-slider img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; }
        .slider-handle {
            position: absolute; top: 0; bottom: 0; width: 5px; background: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.6); cursor: ew-resize; z-index: 10;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen pb-24">

    <!-- DASHBOARD with Logo -->
    <div id="dashboard" class="screen p-6 max-w-lg mx-auto">
        <div class="flex justify-between items-start mb-8">
            <div class="forge-logo">
                <!-- SVG Logo -->
                <svg class="forge-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M24 6 L30 18 L42 18 L33 28 L39 42 L24 34 L9 42 L15 28 L6 18 L18 18 Z" fill="#67e8f9" stroke="#22d3ee" stroke-width="3" stroke-linejoin="round"/>
                    <circle cx="24" cy="24" r="6" fill="#0e1729"/>
                </svg>
                <h1 class="forge-text">Forge</h1>
            </div>
            <div class="text-right">
                <div id="streakDisplay" class="text-4xl font-bold text-orange-400">0 🔥</div>
                <div class="text-xs tracking-widest text-zinc-500 uppercase">streak</div>
            </div>
        </div>

        <div class="glass rounded-3xl p-6 mb-8 flex items-center justify-between">
            <div class="text-center flex-1">
                <div id="fighterLevel" class="text-xl font-bold text-amber-400">Rookie</div>
                <div class="text-xs text-zinc-400 mt-1">LEVEL</div>
            </div>
            <div class="h-9 w-px bg-zinc-700"></div>
            <div class="text-center flex-1">
                <div id="weeklyLoss" class="text-xl font-bold text-emerald-400">— kg</div>
                <div class="text-xs text-zinc-400 mt-1">THIS WEEK</div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="glass rounded-3xl p-6 text-center">
                <p class="text-sm text-zinc-400 mb-1">Weight</p>
                <div id="dashWeight" class="mainValue">—</div>
                <p class="text-emerald-400 text-sm">kg</p>
            </div>
            <div class="glass rounded-3xl p-6 text-center">
                <p class="text-sm text-zinc-400 mb-1">BMI</p>
                <div id="dashBMI" class="mainValue">—</div>
            </div>
            <div class="glass rounded-3xl p-6 text-center">
                <p class="text-sm text-zinc-400 mb-1">Waist</p>
                <div id="dashWaist" class="mainValue">—</div>
                <p class="text-amber-400 text-sm">cm</p>
            </div>
            <div class="glass rounded-3xl p-6 text-center">
                <p class="text-sm text-zinc-400 mb-1">Next Injection</p>
                <div id="dashNextInjection" class="mainValue">—</div>
                <p id="dashNextLabel" class="text-xs mt-1"></p>
            </div>
        </div>

        <button onclick="showScreen('log')" class="btn-primary w-full mt-10 text-zinc-950 font-semibold py-5 rounded-3xl text-xl shadow-xl">
            Log Today’s Progress
        </button>
    </div>

    <!-- The rest of the app (Log, Graphs, Photos, Profile) remains the same as the previous version -->
    <!-- LOG -->
    <div id="log" class="screen p-5 max-w-lg mx-auto hidden" style="max-height: calc(100vh - 110px); overflow-y: auto;">
        <h2 class="text-3xl font-bold mb-6 text-cyan-400 tracking-tight">Today’s Log</h2>
        <div class="glass rounded-3xl p-6 space-y-6">
            <div>
                <label class="block text-xs text-zinc-400 mb-1.5">DATE</label>
                <input id="logDate" type="date" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3.5 text-white">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs text-zinc-400 mb-1.5">WEIGHT (kg)</label>
                    <input id="logWeight" type="number" step="0.1" placeholder="92.5" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3.5 text-white">
                </div>
                <div>
                    <label class="block text-xs text-zinc-400 mb-1.5">WAIST (cm)</label>
                    <input id="logWaist" type="number" step="0.1" placeholder="105" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3.5 text-white">
                </div>
            </div>

            <div class="pt-4 border-t border-zinc-700">
                <p class="text-xs text-zinc-400 mb-3">INJECTION</p>
                <div class="flex flex-wrap gap-2">
                    <button onclick="selectSite(this)" data-site="Abdomen-Left" class="site-btn px-5 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm transition">Abd L</button>
                    <button onclick="selectSite(this)" data-site="Abdomen-Right" class="site-btn px-5 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm transition">Abd R</button>
                    <button onclick="selectSite(this)" data-site="Thigh-Left" class="site-btn px-5 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm transition">Thigh L</button>
                    <button onclick="selectSite(this)" data-site="Thigh-Right" class="site-btn px-5 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm transition">Thigh R</button>
                    <button onclick="selectSite(this)" data-site="Arm-Left" class="site-btn px-5 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm transition">Arm L</button>
                    <button onclick="selectSite(this)" data-site="Arm-Right" class="site-btn px-5 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm transition">Arm R</button>
                </div>
                <input id="logDose" type="number" step="0.1" placeholder="Dose (mg)" class="mt-5 w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3.5 text-white">
            </div>

            <div class="pt-4 border-t border-zinc-700">
                <p class="text-xs text-zinc-400 mb-3">SIDE EFFECTS (tap to mark)</p>
                <div id="sideEffectsContainer" class="grid grid-cols-2 gap-2 text-sm"></div>
            </div>

            <div class="pt-4 border-t border-zinc-700">
                <p class="text-xs text-zinc-400 mb-2">PROGRESS PHOTO</p>
                <input id="photoInput" type="file" accept="image/*" class="hidden" onchange="handlePhoto(this)">
                <button onclick="document.getElementById('photoInput').click()" 
                        class="w-full border border-dashed border-zinc-600 py-7 rounded-3xl text-zinc-400 hover:text-white transition flex flex-col items-center gap-2">
                    <span class="text-2xl">📸</span>
                    <span class="text-sm">Tap to add photo</span>
                </button>
                <div id="photoPreview" class="mt-4 hidden rounded-2xl overflow-hidden border border-zinc-700">
                    <img id="previewImg" class="w-full">
                </div>
            </div>

            <button onclick="saveLogEntry()" class="btn-primary w-full py-5 rounded-3xl font-semibold text-lg mt-4 text-zinc-950">
                Save Entry
            </button>
        </div>
    </div>

    <!-- GRAPHS, PHOTOS, PROFILE remain unchanged from previous version (copy them from the last full code if needed) -->
    <!-- For brevity, I'm showing only the changed parts. Use the full structure from my previous response for the other screens. -->

    <!-- BOTTOM NAV (unchanged) -->
    <nav class="fixed bottom-0 left-0 right-0 bg-zinc-900/95 backdrop-blur-xl border-t border-zinc-800 max-w-lg mx-auto">
        <div class="flex text-xs">
            <button onclick="showScreen('dashboard')" class="nav-btn active flex-1 py-4 flex flex-col items-center gap-0.5">🏠<br><span class="text-[10px]">Home</span></button>
            <button onclick="showScreen('log')" class="nav-btn flex-1 py-4 flex flex-col items-center gap-0.5">📝<br><span class="text-[10px]">Log</span></button>
            <button onclick="showScreen('graphs')" class="nav-btn flex-1 py-4 flex flex-col items-center gap-0.5">📈<br><span class="text-[10px]">Graphs</span></button>
            <button onclick="showScreen('photos')" class="nav-btn flex-1 py-4 flex flex-col items-center gap-0.5">📸<br><span class="text-[10px]">Photos</span></button>
            <button onclick="showScreen('profile')" class="nav-btn flex-1 py-4 flex flex-col items-center gap-0.5">👤<br><span class="text-[10px]">Profile</span></button>
        </div>
    </nav>

    <!-- Rest of the JavaScript is the same as the previous version. Just make sure to include the full <script> block from my last response. -->

</body>
</html>
