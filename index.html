<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fat Fighters</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icon.svg">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

    <style>
        body { font-family: system-ui, sans-serif; }
        .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.15); }
        .nav-btn.active { color: #22d3ee; border-bottom: 3px solid #22d3ee; }
        .mainValue { font-size: 2.8rem; line-height: 1; font-weight: 700; }
        .highlight-red { color: #ef4444; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
        .photo-grid img { transition: transform 0.3s; }
        .photo-grid img:hover { transform: scale(1.05); }
        .comparison-slider {
            position: relative;
            overflow: hidden;
        }
        .comparison-slider img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
        }
        .comparison-after {
            clip-path: polygon(50% 0, 100% 0, 100% 100%, 50% 100%);
        }
        .slider-handle {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 4px;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            cursor: ew-resize;
            z-index: 10;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen pb-24">

    <!-- DASHBOARD (unchanged for brevity - keep your previous dashboard code here) -->
    <div id="dashboard" class="screen p-6 max-w-lg mx-auto">
        <!-- ... your existing dashboard content ... -->
        <button onclick="showScreen('log')" class="w-full bg-gradient-to-r from-cyan-400 to-emerald-400 text-zinc-950 font-bold py-5 rounded-3xl text-xl shadow-lg mt-6">
            Log Today + Injection
        </button>
    </div>

    <!-- LOG SCREEN (photo upload part remains) -->
    <div id="log" class="screen p-6 max-w-lg mx-auto hidden">
        <!-- ... keep all your existing log fields ... -->
        <!-- Progress Photo section inside log -->
        <div class="pt-4 border-t border-zinc-700">
            <p class="text-sm text-zinc-400 mb-2">Progress Photo (optional)</p>
            <input id="photoInput" type="file" accept="image/*" class="hidden" onchange="handlePhoto(this)">
            <button onclick="document.getElementById('photoInput').click()" 
                    class="w-full border border-dashed border-zinc-600 py-6 rounded-3xl text-zinc-400 hover:text-white transition">
                📸 Tap to add today's photo
            </button>
            <div id="photoPreview" class="mt-3 hidden rounded-2xl overflow-hidden">
                <img id="previewImg" class="w-full">
            </div>
        </div>

        <button onclick="saveLogEntry()" class="w-full bg-emerald-500 py-5 rounded-3xl font-bold text-lg mt-8">
            Save Log Entry
        </button>
    </div>

    <!-- NEW PHOTOS SCREEN -->
    <div id="photos" class="screen p-6 max-w-lg mx-auto hidden">
        <h2 class="text-3xl font-bold mb-2 text-cyan-400">Visual Progress</h2>
        <p class="text-zinc-400 mb-6">Your transformation battle log 📸</p>

        <div id="photoGallery" class="photo-grid grid grid-cols-2 gap-4">
            <!-- Populated by JS -->
        </div>

        <div id="noPhotos" class="text-center py-12 text-zinc-500 hidden">
            <p class="text-6xl mb-4">📸</p>
            <p>No photos yet.<br>Upload your first one in the Log screen.</p>
        </div>
    </div>

    <!-- Comparison Modal -->
    <div id="comparisonModal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4">
        <div class="max-w-lg w-full">
            <div class="flex justify-between mb-4">
                <h3 class="text-xl font-semibold" id="modalTitle">Before vs After</h3>
                <button onclick="closeComparison()" class="text-3xl leading-none">×</button>
            </div>
            <div id="comparisonContainer" class="comparison-slider rounded-3xl overflow-hidden shadow-2xl" style="height: 420px;">
                <!-- Images added by JS -->
            </div>
            <p class="text-center text-xs text-zinc-500 mt-4">Drag the white line to compare</p>
        </div>
    </div>

    <!-- GRAPHS & PROFILE (keep as before) -->
    <!-- ... your existing graphs and profile screens ... -->

    <!-- BOTTOM NAV - added Photos tab -->
    <nav class="fixed bottom-0 left-0 right-0 bg-zinc-900 border-t border-zinc-800 max-w-lg mx-auto">
        <div class="flex text-xs">
            <button onclick="showScreen('dashboard')" class="nav-btn flex-1 py-4 flex flex-col items-center">🏠<br>Home</button>
            <button onclick="showScreen('log')" class="nav-btn flex-1 py-4 flex flex-col items-center">📝<br>Log</button>
            <button onclick="showScreen('graphs')" class="nav-btn flex-1 py-4 flex flex-col items-center">📈<br>Graphs</button>
            <button onclick="showScreen('photos')" class="nav-btn flex-1 py-4 flex flex-col items-center">📸<br>Photos</button>
            <button onclick="showScreen('profile')" class="nav-btn flex-1 py-4 flex flex-col items-center">👤<br>Profile</button>
        </div>
    </nav>

    <script>
        // === Existing data & functions (keep all your previous variables and functions) ===
        let entries = JSON.parse(localStorage.getItem("fatfightersEntries") || "[]");
        let profile = JSON.parse(localStorage.getItem("fatfightersProfile") || {});

        let chartInstance = null;
        let selectedSite = null;
        let currentPhoto = null;

        // ... (keep your existing showScreen, saveLogEntry, loadDashboard, renderChart, initLogScreen, etc.)

        // New: Render Photo Gallery
        function renderPhotoGallery() {
            const container = document.getElementById('photoGallery');
            const noPhotos = document.getElementById('noPhotos');
            container.innerHTML = '';

            const photos = entries.filter(e => e.photo).sort((a, b) => new Date(b.date) - new Date(a.date));

            if (photos.length === 0) {
                noPhotos.classList.remove('hidden');
                return;
            }
            noPhotos.classList.add('hidden');

            photos.forEach((entry, index) => {
                const div = document.createElement('div');
                div.className = "glass rounded-3xl overflow-hidden cursor-pointer";
                div.innerHTML = `
                    <img src="${entry.photo}" class="w-full h-56 object-cover">
                    <div class="p-3 text-xs">
                        <div class="font-medium">${entry.date}</div>
                        <div class="text-zinc-400">
                            ${entry.weight ? entry.weight + ' kg' : ''} 
                            ${entry.waist ? ' • ' + entry.waist + ' cm' : ''}
                        </div>
                    </div>
                `;
                div.onclick = () => openComparisonModal(index);
                container.appendChild(div);
            });
        }

        // Simple side-by-side comparison with draggable slider
        let currentPhotosForCompare = [];

        function openComparisonModal(startIndex) {
            const photos = entries.filter(e => e.photo).sort((a, b) => new Date(b.date) - new Date(a.date));
            currentPhotosForCompare = [photos[startIndex], photos[(startIndex + 1) % photos.length] || photos[startIndex]];

            const modal = document.getElementById('comparisonModal');
            const container = document.getElementById('comparisonContainer');
            container.innerHTML = `
                <img src="${currentPhotosForCompare[0].photo}" class="before-img" style="height:100%; width:100%; object-fit:cover;">
                <img src="${currentPhotosForCompare[1].photo}" class="after-img" style="height:100%; width:100%; object-fit:cover; clip-path: polygon(50% 0, 100% 0, 100% 100%, 50% 100%);">
                <div class="slider-handle" style="left:50%;"></div>
            `;

            modal.classList.remove('hidden');

            // Draggable slider logic
            const handle = container.querySelector('.slider-handle');
            const afterImg = container.querySelector('.after-img');
            let isDragging = false;

            function moveSlider(e) {
                if (!isDragging) return;
                const rect = container.getBoundingClientRect();
                let percent = ((e.clientX || e.touches[0].clientX) - rect.left) / rect.width * 100;
                percent = Math.max(0, Math.min(100, percent));
                afterImg.style.clipPath = `polygon(${percent}% 0, 100% 0, 100% 100%, ${percent}% 100%)`;
                handle.style.left = `${percent}%`;
            }

            handle.addEventListener('mousedown', () => isDragging = true);
            handle.addEventListener('touchstart', () => isDragging = true);
            document.addEventListener('mouseup', () => isDragging = false);
            document.addEventListener('touchend', () => isDragging = false);
            document.addEventListener('mousemove', moveSlider);
            document.addEventListener('touchmove', moveSlider);
        }

        function closeComparison() {
            document.getElementById('comparisonModal').classList.add('hidden');
        }

        // Update showScreen to refresh gallery
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');

            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const btn = Array.from(document.querySelectorAll('.nav-btn')).find(b => b.getAttribute('onclick').includes(`'${id}'`));
            if (btn) btn.classList.add('active');

            if (id === 'graphs') renderChart();
            if (id === 'dashboard') loadDashboard();
            if (id === 'log') initLogScreen();
            if (id === 'photos') renderPhotoGallery();
        }

        // Keep your saveLogEntry and handlePhoto functions (they already store the photo in entry.photo)

        function init() {
            // ... your existing init code ...
            renderPhotoGallery(); // initial load
        }

        window.onload = init;
    </script>
</body>
</html>
