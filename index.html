<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fat Fighters</title>

    <link rel="manifest" href="manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Fat Fighters">

    <link rel="apple-touch-icon" href="icon.svg">

    <style>
        body {
            margin: 0;
            background: #2A2A2A;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        }

        .screen {
            display: none;
            padding: 20px;
        }

        .active {
            display: block;
        }

        h2 {
            margin-top: 0;
            color: #00C8FF;
            text-shadow: 0 0 10px #00C8FF;
        }

        /* GLASS CARD STYLE */
        .glass {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 15px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 20px rgba(0, 200, 255, 0.2);
        }

        .dashGrid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .tile {
            height: 140px;
            text-align: center;
        }

        .mainValue {
            font-size: 32px;
            font-weight: bold;
            margin-top: 10px;
            text-shadow: 0 0 10px #00C8FF;
        }

        /* NAV BAR */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
        }

        nav button {
            flex: 1;
            padding: 15px;
            background: transparent;
            color: white;
            border: none;
            font-size: 16px;
        }

        nav button.activeTab {
            color: #00C8FF;
            text-shadow: 0 0 10px #00C8FF;
        }

        /* INPUTS */
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0 16px 0;
            border-radius: 12px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        button.saveBtn {
            width: 100%;
            padding: 15px;
            background: #00C8FF;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            color: black;
            box-shadow: 0 0 15px #00C8FF;
        }
    </style>
</head>

<body>

    <!-- DASHBOARD -->
    <div id="dashboard" class="screen active">
        <h2>Hi <span id="dashName">David</span></h2>

        <div class="dashGrid">
            <div class="glass tile">
                <h3>Weight</h3>
                <div class="mainValue" id="dashWeight">--</div>
            </div>

            <div class="glass tile">
                <h3>BMI</h3>
                <div class="mainValue" id="dashBMI">--</div>
            </div>

            <div class="glass tile">
                <h3>Waist</h3>
                <div class="mainValue" id="dashWaist">--</div>
            </div>

            <div class="glass tile">
                <h3>Next Injection</h3>
                <div class="mainValue" id="dashInjection">--</div>
            </div>
        </div>
    </div>

    <!-- LOG -->
    <div id="log" class="screen">
        <h2>Log</h2>
        <div class="glass" style="padding:20px;">Coming soon.</div>
    </div>

    <!-- GRAPHS -->
    <div id="graphs" class="screen">
        <h2>Graphs</h2>
        <div class="glass" style="padding:20px;">Coming soon.</div>
    </div>

    <!-- GOALS -->
    <div id="goals" class="screen">
        <h2>Goals</h2>
        <div class="glass" style="padding:20px;">Coming soon.</div>
    </div>

    <!-- SETTINGS / PROFILE -->
    <div id="settings" class="screen">
        <h2>Your Profile</h2>

        <div class="glass" style="padding:20px;">
            <label>Name</label>
            <input id="profileName" type="text" placeholder="David">

            <label>Height (cm)</label>
            <input id="profileHeight" type="number" placeholder="175">

            <label>Starting Weight (kg)</label>
            <input id="profileStartWeight" type="number" placeholder="100">

            <label>Waist (cm)</label>
            <input id="profileWaist" type="number" placeholder="120">

            <label>Injection Day</label>
            <input id="profileInjectionDay" type="text" placeholder="Monday">

            <button class="saveBtn" onclick="saveProfile()">Save Profile</button>
        </div>
    </div>

    <!-- NAVIGATION -->
    <nav>
        <button onclick="showScreen('dashboard')" class="activeTab">Home</button>
        <button onclick="showScreen('log')">Log</button>
        <button onclick="showScreen('graphs')">Graphs</button>
        <button onclick="showScreen('goals')">Goals</button>
        <button onclick="showScreen('settings')">Settings</button>
    </nav>

    <script>
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');

            document.querySelectorAll('nav button').forEach(b => b.classList.remove('activeTab'));
            event.target.classList.add('activeTab');
        }

        function saveProfile() {
            const profile = {
                name: profileName.value,
                height: profileHeight.value,
                startWeight: profileStartWeight.value,
                waist: profileWaist.value,
                injectionDay: profileInjectionDay.value
            };

            localStorage.setItem("fatfightersProfile", JSON.stringify(profile));
            alert("Profile saved!");
            loadProfile();
        }

        function loadProfile() {
            const saved = localStorage.getItem("fatfightersProfile");
            if (!saved) return;

            const p = JSON.parse(saved);

            profileName.value = p.name || "";
            profileHeight.value = p.height || "";
            profileStartWeight.value = p.startWeight || "";
            profileWaist.value = p.waist || "";
            profileInjectionDay.value = p.injectionDay || "";

            dashName.textContent = p.name || "David";
            dashWeight.textContent = p.startWeight || "--";
            dashWaist.textContent = p.waist || "--";
            dashInjection.textContent = p.injectionDay || "--";

            if (p.height && p.startWeight) {
                const h = p.height / 100;
                const bmi = (p.startWeight / (h * h)).toFixed(1);
                dashBMI.textContent = bmi;
            }
        }

        loadProfile();

        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("service-worker.js");
        }
    </script>

</body>
</html>
