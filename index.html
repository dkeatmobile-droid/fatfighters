<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forge</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icon.svg">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        }
        .glass { 
            background: rgba(30, 30, 40, 0.78); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.12); 
        }
        .nav-btn.active { color: #67e8f9; border-bottom: 3px solid #67e8f9; }
        .mainValue { font-size: 2.8rem; line-height: 1; font-weight: 700; }

        /* Your chosen logo - clean SVG version */
        .forge-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen pb-24">

    <!-- DASHBOARD with your exact logo -->
    <div id="dashboard" class="screen p-6 max-w-lg mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div class="forge-logo">
                <!-- Inline SVG matching your image -->
                <svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="19" cy="11" r="7" fill="#67e8f9" filter="url(#glow)"/>
                    <defs>
                        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                            <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
                        </filter>
                    </defs>
                </svg>
                <h1 style="font-size: 2.95rem; font-weight: 700; letter-spacing: -0.03em; background: linear-gradient(90deg, #67e8f9, #e0f2fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                    Forge
                </h1>
            </div>
            <div class="text-right">
                <div id="streakDisplay" class="text-4xl font-bold text-orange-400">0 🔥</div>
                <div class="text-xs text-zinc-500">STREAK</div>
            </div>
        </div>

        <div class="glass rounded-3xl p-6 mb-8">
            <div class="grid grid-cols-2 gap-6 text-center">
                <div>
                    <div id="dashBMI" class="mainValue text-cyan-400">—</div>
                    <div class="text-xs text-zinc-400">CURRENT BMI</div>
                </div>
                <div>
                    <div id="startBMI" class="mainValue text-amber-400">—</div>
                    <div class="text-xs text-zinc-400">START BMI</div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="glass rounded-3xl p-6 text-center">
                <p class="text-sm text-zinc-400">Weight</p>
                <div id="dashWeight" class="mainValue">—</div>
                <p class="text-emerald-400 text-sm">kg</p>
            </div>
            <div class="glass rounded-3xl p-6 text-center">
                <p class="text-sm text-zinc-400">Waist</p>
                <div id="dashWaist" class="mainValue">—</div>
                <p class="text-amber-400 text-sm">inches</p>
            </div>
        </div>

        <button onclick="showScreen('log')" class="bg-gradient-to-r from-cyan-400 to-sky-400 w-full mt-10 py-5 rounded-3xl font-semibold text-xl text-zinc-950">
            Log Today’s Progress
        </button>
    </div>

    <!-- LOG (compact, saves correctly) -->
    <div id="log" class="screen p-5 max-w-lg mx-auto hidden" style="max-height: calc(100vh - 110px); overflow-y: auto;">
        <h2 class="text-3xl font-bold mb-6 text-cyan-400">Today’s Log</h2>
        
        <div class="glass rounded-3xl p-6 space-y-6">
            <div>
                <label class="block text-xs text-zinc-400 mb-1.5">DATE</label>
                <input id="logDate" type="date" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3.5 text-white">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs text-zinc-400 mb-1.5">WEIGHT (kg)</label>
                    <input id="logWeight" type="number" step="0.1" placeholder="92.5" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3.5 text-white">
                </div>
                <div>
                    <label class="block text-xs text-zinc-400 mb-1.5">WAIST (inches)</label>
                    <input id="logWaist" type="number" step="0.1" placeholder="42.0" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3.5 text-white">
                </div>
            </div>

            <div class="pt-4 border-t border-zinc-700">
                <p class="text-xs text-zinc-400 mb-3">INJECTION</p>
                <div class="flex flex-wrap gap-2">
                    <button onclick="selectSite(this)" data-site="Abdomen-Left" class="site-btn px-5 py-2.5 bg-zinc-800 rounded-2xl text-sm">Abd L</button>
                    <button onclick="selectSite(this)" data-site="Abdomen-Right" class="site-btn px-5 py-2.5 bg-zinc-800 rounded-2xl text-sm">Abd R</button>
                    <button onclick="selectSite(this)" data-site="Thigh-Left" class="site-btn px-5 py-2.5 bg-zinc-800 rounded-2xl text-sm">Thigh L</button>
                    <button onclick="selectSite(this)" data-site="Thigh-Right" class="site-btn px-5 py-2.5 bg-zinc-800 rounded-2xl text-sm">Thigh R</button>
                    <button onclick="selectSite(this)" data-site="Arm-Left" class="site-btn px-5 py-2.5 bg-zinc-800 rounded-2xl text-sm">Arm L</button>
                    <button onclick="selectSite(this)" data-site="Arm-Right" class="site-btn px-5 py-2.5 bg-zinc-800 rounded-2xl text-sm">Arm R</button>
                </div>
                <input id="logDose" type="number" step="0.1" placeholder="Dose (mg)" class="mt-5 w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3.5 text-white">
            </div>

            <div class="pt-4 border-t border-zinc-700">
                <p class="text-xs text-zinc-400 mb-3">SIDE EFFECTS (tap to mark)</p>
                <div id="sideEffectsContainer" class="grid grid-cols-2 gap-2 text-sm"></div>
            </div>

            <div class="pt-4 border-t border-zinc-700">
                <p class="text-xs text-zinc-400 mb-2">PROGRESS PHOTO</p>
                <input id="photoInput" type="file" accept="image/*" class="hidden" onchange="handlePhoto(this)">
                <button onclick="document.getElementById('photoInput').click()" 
                        class="w-full border border-dashed border-zinc-600 py-7 rounded-3xl text-zinc-400 hover:text-white">
                    📸 Tap to add photo
                </button>
                <div id="photoPreview" class="mt-4 hidden rounded-2xl overflow-hidden">
                    <img id="previewImg" class="w-full">
                </div>
            </div>

            <button onclick="saveLogEntry()" class="bg-gradient-to-r from-cyan-400 to-sky-400 w-full py-5 rounded-3xl font-semibold text-lg text-zinc-950 mt-4">
                Save Entry
            </button>
        </div>
    </div>

    <!-- GRAPHS -->
    <div id="graphs" class="screen p-6 max-w-lg mx-auto hidden">
        <h2 class="text-3xl font-bold mb-6 text-cyan-400">Your Progress</h2>
        <div class="glass rounded-3xl p-6">
            <canvas id="progressChart" height="290"></canvas>
        </div>
    </div>

    <!-- PHOTOS -->
    <div id="photos" class="screen p-6 max-w-lg mx-auto hidden">
        <h2 class="text-3xl font-bold mb-2 text-cyan-400">Visual Progress</h2>
        <p class="text-zinc-400 mb-6">Watch your transformation unfold</p>
        <div id="photoGallery" class="grid grid-cols-2 gap-4"></div>
        <div id="noPhotos" class="hidden text-center py-20 text-zinc-500">
            <p class="text-7xl mb-4">📸</p>
            <p>No photos yet</p>
        </div>
    </div>

    <!-- PROFILE -->
    <div id="profile" class="screen p-6 max-w-lg mx-auto hidden">
        <h2 class="text-3xl font-bold mb-6 text-cyan-400">Your Profile</h2>
        <div class="glass rounded-3xl p-6 space-y-6">
            <div>
                <label class="block text-xs text-zinc-400 mb-1.5">NAME</label>
                <input id="profileName" type="text" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 text-white">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs text-zinc-400 mb-1.5">HEIGHT (cm)</label>
                    <input id="profileHeight" type="number" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 text-white">
                </div>
                <div>
                    <label class="block text-xs text-zinc-400 mb-1.5">START WEIGHT (kg)</label>
                    <input id="profileStartWeight" type="number" step="0.1" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 text-white">
                </div>
            </div>
            <div>
                <label class="block text-xs text-zinc-400 mb-1.5">USUAL DOSE (mg)</label>
                <input id="profileUsualDose" type="number" step="0.1" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 text-white">
            </div>
            <div>
                <label class="block text-xs text-zinc-400 mb-1.5">NEXT INJECTION DATE</label>
                <input id="profileNextInjection" type="date" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 text-white">
            </div>
            <button onclick="saveProfile()" class="bg-gradient-to-r from-cyan-400 to-sky-400 w-full py-5 rounded-3xl font-semibold text-lg text-zinc-950">
                Save Profile
            </button>
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="fixed bottom-0 left-0 right-0 bg-zinc-900 border-t border-zinc-800 max-w-lg mx-auto">
        <div class="flex text-xs">
            <button onclick="showScreen('dashboard')" class="nav-btn active flex-1 py-4 flex flex-col items-center">🏠<br>Home</button>
            <button onclick="showScreen('log')" class="nav-btn flex-1 py-4 flex flex-col items-center">📝<br>Log</button>
            <button onclick="showScreen('graphs')" class="nav-btn flex-1 py-4 flex flex-col items-center">📈<br>Graphs</button>
            <button onclick="showScreen('photos')" class="nav-btn flex-1 py-4 flex flex-col items-center">📸<br>Photos</button>
            <button onclick="showScreen('profile')" class="nav-btn flex-1 py-4 flex flex-col items-center">👤<br>Profile</button>
        </div>
    </nav>

    <script>
        let entries = JSON.parse(localStorage.getItem("forgeEntries") || "[]");
        let profile = JSON.parse(localStorage.getItem("forgeProfile") || {});

        let chartInstance = null;
        let selectedSite = null;
        let currentPhoto = null;

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');

            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const btn = Array.from(document.querySelectorAll('.nav-btn')).find(b => b.getAttribute('onclick').includes(`'${id}'`));
            if (btn) btn.classList.add('active');

            if (id === 'graphs') renderChart();
            if (id === 'dashboard') loadDashboard();
            if (id === 'log') initLogScreen();
            if (id === 'photos') renderPhotoGallery();
        }

        function calculateStreak() {
            if (entries.length === 0) return 0;
            const dates = [...new Set(entries.map(e => e.date))].sort().reverse();
            let streak = 1;
            for (let i = 1; i < dates.length; i++) {
                if ((new Date(dates[i-1]) - new Date(dates[i])) / 86400000 === 1) streak++;
                else break;
            }
            return streak;
        }

        function loadDashboard() {
            const latest = entries[0] || {};
            document.getElementById('dashWeight').textContent = latest.weight || "—";
            document.getElementById('dashWaist').textContent = latest.waist ? latest.waist.toFixed(1) : "—";

            if (profile.height) {
                if (latest.weight) {
                    const currentBMI = (latest.weight / Math.pow(profile.height / 100, 2)).toFixed(1);
                    document.getElementById('dashBMI').textContent = currentBMI;
                }
                if (profile.startWeight) {
                    const startBMI = (profile.startWeight / Math.pow(profile.height / 100, 2)).toFixed(1);
                    document.getElementById('startBMI').textContent = startBMI;
                }
            }
        }

        function selectSite(btn) {
            document.querySelectorAll('.site-btn').forEach(b => b.classList.remove('bg-cyan-500', 'text-black'));
            btn.classList.add('bg-cyan-500', 'text-black');
            selectedSite = btn.dataset.site;
        }

        function initLogScreen() {
            document.getElementById('logDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('photoPreview').classList.add('hidden');
            currentPhoto = null;

            const container = document.getElementById('sideEffectsContainer');
            container.innerHTML = ["Nausea","Fatigue","Constipation","Diarrhea","Headache"].map(se => `
                <div onclick="this.classList.toggle('bg-red-500');this.classList.toggle('text-white')" 
                     class="side-effect px-5 py-3 bg-zinc-800 rounded-2xl text-center cursor-pointer text-sm transition">
                    ${se}
                </div>
            `).join('');
        }

        function handlePhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    currentPhoto = e.target.result;
                    document.getElementById('previewImg').src = currentPhoto;
                    document.getElementById('photoPreview').classList.remove('hidden');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveLogEntry() {
            const entry = {
                date: document.getElementById('logDate').value || new Date().toISOString().split('T')[0],
                weight: parseFloat(document.getElementById('logWeight').value),
                waist: parseFloat(document.getElementById('logWaist').value),
                dose: parseFloat(document.getElementById('logDose').value),
                site: selectedSite,
                sideEffects: Array.from(document.querySelectorAll('.side-effect.bg-red-500')).map(el => el.textContent.trim()),
                photo: currentPhoto
            };

            if (!entry.weight && !entry.waist && !entry.dose) {
                alert("Please enter at least weight, waist or dose.");
                return;
            }

            entries.unshift(entry);
            localStorage.setItem("forgeEntries", JSON.stringify(entries));

            if (entry.dose && profile.nextInjection) {
                let d = new Date(profile.nextInjection);
                d.setDate(d.getDate() + 7);
                profile.nextInjection = d.toISOString().split('T')[0];
                localStorage.setItem("forgeProfile", JSON.stringify(profile));
            }

            if (calculateStreak() % 7 === 0) confetti({particleCount: 150, spread: 70});

            alert("✅ Log saved!");
            loadDashboard();
            showScreen('dashboard');
        }

        function saveProfile() {
            profile.name = document.getElementById('profileName').value || "Warrior";
            profile.height = parseFloat(document.getElementById('profileHeight').value) || 175;
            profile.startWeight = parseFloat(document.getElementById('profileStartWeight').value);
            profile.usualDose = parseFloat(document.getElementById('profileUsualDose').value) || 1.0;
            profile.nextInjection = document.getElementById('profileNextInjection').value;

            localStorage.setItem("forgeProfile", JSON.stringify(profile));
            alert("✅ Profile saved!");
            loadDashboard();
        }

        function renderChart() {
            if (chartInstance) chartInstance.destroy();
            const ctx = document.getElementById('progressChart');
            const sorted = [...entries].reverse();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: sorted.map(e => e.date),
                    datasets: [
                        { label: 'Weight kg', data: sorted.map(e => e.weight), borderColor: '#67e8f9', tension: 0.3 },
                        { label: 'Waist inches', data: sorted.map(e => e.waist), borderColor: '#fbbf24', tension: 0.3 },
                        { label: 'Dose mg', data: sorted.map(e => e.dose), borderColor: '#c4b5fd', tension: 0.3, yAxisID: 'y1' }
                    ]
                },
                options: {
                    scales: {
                        y: { grid: { color: '#27272a' } },
                        y1: { position: 'right', grid: { color: '#27272a' }, min: 0 }
                    }
                }
            });
        }

        function renderPhotoGallery() {
            const container = document.getElementById('photoGallery');
            container.innerHTML = entries.filter(e => e.photo).map(e => `
                <div class="glass rounded-3xl overflow-hidden">
                    <img src="${e.photo}" class="w-full h-48 object-cover">
                    <div class="p-3 text-xs">${e.date}</div>
                </div>
            `).join('') || '<div class="text-center py-20 text-zinc-500"><p class="text-7xl">📸</p><p>No photos yet</p></div>';
        }

        function init() {
            document.getElementById('profileName').value = profile.name || "";
            document.getElementById('profileHeight').value = profile.height || "";
            document.getElementById('profileStartWeight').value = profile.startWeight || "";
            document.getElementById('profileUsualDose').value = profile.usualDose || "";
            document.getElementById('profileNextInjection').value = profile.nextInjection || "";

            loadDashboard();
            showScreen('dashboard');
        }

        window.onload = init;
    </script>
</body>
</html>
